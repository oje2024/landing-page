<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>루비 키위 - 자연의 달콤함</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">Ruby Kiwi</div>
        <ul class="nav-links">
            <li><a href="#">홈페이지</a></li>
            <li><a href="#product">제품</a></li>
            <li><a href="#story">스토리</a></li>
            <li><a href="#contact">문의</a></li>
        </ul>
    </nav>

    <header class="hero">
        <div class="hero-content">
            <h1>강렬한 레드, <br>달콤한 루비 키위</h1>
            <p>자연이 준 선물, 가장 신선한 루비 키위를 만나보세요.</p>
            <button class="cta-btn">지금 구매하기</button>
        </div>
        <div class="hero-image">
            <img src="ruby-kiwi.png" alt="신선한 루비 키위">
        </div>
    </header>

    <section id="product" class="features">
        <h2>왜 루비 키위인가요?</h2>
        <div class="feature-grid">
            <div class="feature-item">
                <div class="icon">🥝</div>
                <h3>놀라운 당도</h3>
                <p>일반 키위보다 높은 브릭스로 입안 가득 달콤함이 퍼집니다.</p>
            </div>
            <div class="feature-item">
                <div class="icon">✨</div>
                <h3>풍부한 영양</h3>
                <p>비타민 C와 항산화 성분이 가득하여 건강을 챙겨줍니다.</p>
            </div>
            <div class="feature-item">
                <div class="icon">🌿</div>
                <h3>친환경 재배</h3>
                <p>자연 친화적인 농법으로 정성을 다해 키워냈습니다.</p>
            </div>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 Ruby Kiwi Landing Page. All rights reserved.</p>
    </footer>
</body>
</html>
